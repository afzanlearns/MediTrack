# =============================================
# MediTrack — Application Configuration
# =============================================

# --- MySQL DataSource ---
# Update username and password to match your MySQL installation
spring.datasource.url=jdbc:mysql://localhost:3306/meditrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# Flyway manages DDL; Hibernate only validates the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Spring Task Scheduler (for ReminderScheduler) ---
spring.task.scheduling.pool.size=2

# --- Server ---
server.port=8080
