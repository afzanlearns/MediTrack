# =============================================
# MediTrack — Application Configuration
# =============================================

# --- Profiles ---
# Keep local as the default for development; set SPRING_PROFILES_ACTIVE=prod in live environments.
spring.profiles.default=local

# --- JPA / Hibernate ---
# Flyway manages DDL; Hibernate only validates the schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true

# --- Security ---
app.jwt.secret=${JWT_SECRET:dev-only-change-me}
app.google.client-id=${GOOGLE_CLIENT_ID:}

spring.flyway.baseline-on-migrate=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/prescriptions
spring.flyway.locations=classpath:db/migration

# --- Spring Task Scheduler (for ReminderScheduler) ---
spring.task.scheduling.pool.size=2

# --- Server ---
server.port=8080

# --- Web Push VAPID ---
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}
