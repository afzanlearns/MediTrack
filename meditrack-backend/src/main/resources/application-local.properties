# =============================================
# MediTrack — Local Profile
# =============================================

# Local datasource can be overridden by environment variables.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/meditrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:meditrack}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
